<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>東京・関東 撮影地ノート</title>
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">Tokyo / Kanto Field Notes</p>
        <h1 data-i18n="app.title">東京・関東 撮影地ノート</h1>
      </div>
      <div class="language-toggle" role="group" aria-label="Language">
        <button class="active" id="langJa" type="button" data-lang="ja">日本語</button>
        <button id="langZh" type="button" data-lang="zh">中文</button>
      </div>
      <div class="header-stats" aria-label="データ概要">
        <div><strong id="totalCount">0</strong><span data-i18n="stats.total">候補地</span></div>
        <div><strong id="avgScore">-</strong><span data-i18n="stats.avg">平均点</span></div>
        <div><strong id="savedCount">0</strong><span data-i18n="stats.saved">保存済み</span></div>
      </div>
    </header>

    <main class="layout">
      <aside class="sidebar" aria-label="絞り込み条件" data-i18n-attr="aria-label:filters.aria">
        <section class="panel controls">
          <div class="panel-title">
            <h2 data-i18n="filters.title">絞り込み</h2>
            <button class="icon-button" id="resetFilters" type="button" title="絞り込みをリセット" aria-label="絞り込みをリセット" data-i18n-attr="title:filters.reset;aria-label:filters.reset">↺</button>
          </div>

          <label class="search-box">
            <span data-i18n="filters.search">検索</span>
            <input id="searchInput" type="search" placeholder="撮影地、エリア、被写体、レンズ..." autocomplete="off" data-i18n-attr="placeholder:filters.searchPlaceholder" />
          </label>

          <div class="filter-group">
            <span data-i18n="filters.grade">候補ランク</span>
            <div id="gradeFilter" class="multi-filter"></div>
          </div>

          <div class="filter-group">
            <span data-i18n="filters.pref">都県</span>
            <div id="prefFilter" class="multi-filter"></div>
          </div>

          <div class="filter-group">
            <span data-i18n="filters.type">カテゴリ</span>
            <div id="typeFilter" class="multi-filter"></div>
          </div>

          <div class="filter-group">
            <span data-i18n="filters.access">アクセス</span>
            <div id="trafficFilter" class="multi-filter"></div>
          </div>

          <div class="filter-group">
            <span data-i18n="filters.time">移動時間</span>
            <div id="timeFilter" class="multi-filter"></div>
          </div>

          <label>
            <span><span data-i18n="filters.minScore">最低スコア</span> <b id="minScoreValue">0</b></span>
            <input id="minScore" type="range" min="0" max="100" value="0" />
          </label>

          <label class="check-row">
            <input id="savedOnly" type="checkbox" />
            <span data-i18n="filters.savedOnly">保存済みのみ</span>
          </label>

          <label class="check-row season-row">
            <input id="seasonNow" type="checkbox" />
            <span data-i18n="filters.seasonNow">今が見頃のみ</span>
          </label>

          <label class="check-row season-row">
            <input id="weatherMatch" type="checkbox" />
            <span data-i18n="filters.weatherMatch">天気に合う場所のみ</span>
          </label>

          <label class="home-row">
            <span data-i18n="filters.home">出発地</span>
            <select id="homePref">
              <option value="" data-i18n="filters.homeNone">設定しない</option>
              <option value="東京都">東京</option>
              <option value="神奈川県">神奈川</option>
              <option value="千葉県">千葉</option>
              <option value="埼玉県">埼玉</option>
              <option value="茨城県">茨城</option>
              <option value="栃木県">栃木</option>
              <option value="群馬県">群馬</option>
              <option value="山梨県">山梨</option>
              <option value="静岡県">静岡</option>
            </select>
          </label>
        </section>

        <section class="panel weather-panel" id="weatherPanel">
          <div class="panel-title">
            <h2 data-i18n="sections.weather">週末の天気</h2>
            <button class="icon-button" id="refreshWeather" type="button" title="更新" aria-label="天気を更新">↻</button>
          </div>
          <div id="weatherContent" class="weather-content">
            <p class="weather-loading" data-i18n="weather.loading">読み込み中...</p>
          </div>
          <label class="comfort-row">
            <span><span data-i18n="weather.comfortLabel">快適気温</span> <b id="comfortValue">26</b>°C</span>
            <input id="comfortTemp" type="range" min="15" max="35" value="26" />
          </label>
        </section>

        <section class="panel">
          <div class="panel-title">
            <h2 data-i18n="sections.photoSites">日本の写真サイト</h2>
          </div>
          <div id="photoSites" class="photo-site-list"></div>
        </section>

        <section class="panel trip-panel" id="tripPanel">
          <div class="panel-title">
            <h2 data-i18n="sections.trip">旅程計画</h2>
            <button class="icon-button" id="clearTrip" type="button" title="クリア" aria-label="旅程をクリア">✕</button>
          </div>
          <div id="tripContent" class="trip-content">
            <p class="trip-empty">旅程に追加してみよう</p>
          </div>
        </section>

        <section class="panel">
          <div class="panel-title">
            <h2 data-i18n="sections.scoring">採点モデル</h2>
          </div>
          <div id="scoringModel" class="scoring-list"></div>
        </section>
      </aside>

      <section class="content">
        <section class="toolbar">
          <div>
            <p class="muted" data-i18n="toolbar.showing">表示中</p>
            <h2><span id="resultCount">0</span> <span data-i18n="toolbar.countSuffix">件</span></h2>
          </div>
          <div class="toolbar-actions">
            <label>
              <span data-i18n="toolbar.sort">並び順</span>
              <select id="sortSelect">
                <option value="score-desc" data-i18n="sort.scoreDesc">スコアが高い順</option>
                <option value="score-asc" data-i18n="sort.scoreAsc">スコアが低い順</option>
                <option value="niche-desc" data-i18n="sort.nicheDesc">穴場度が高い順</option>
                <option value="traffic" data-i18n="sort.traffic">アクセス優先</option>
                <option value="name" data-i18n="sort.name">撮影地名</option>
              </select>
            </label>
            <div class="view-toggle" role="group" aria-label="表示切替">
              <button class="active" id="cardViewBtn" type="button" data-i18n="views.cards">カード</button>
              <button id="tableViewBtn" type="button" data-i18n="views.table">表</button>
              <button id="mapViewBtn" type="button" data-i18n="views.map">地図</button>
            </div>
            <div class="score-toggle-group" id="scoreToggleGroup">
              <button id="expandAllScores" type="button" data-i18n="card.expandAll">全て展開</button>
              <button id="collapseAllScores" type="button" data-i18n="card.collapseAll">全て折畳</button>
            </div>
          </div>
        </section>

        <section class="summary-grid" aria-label="結果サマリー">
          <div class="panel">
            <h2 data-i18n="sections.gradeChart">ランク分布</h2>
            <div id="gradeChart" class="bar-chart"></div>
          </div>
          <div class="panel">
            <h2 data-i18n="sections.typeChart">カテゴリ概要</h2>
            <div id="typeChart" class="bar-chart compact"></div>
          </div>
          <div class="panel highlight">
            <h2 data-i18n="sections.best">最高スコア</h2>
            <div id="bestSpot"></div>
          </div>
        </section>

        <section id="cards" class="cards" aria-live="polite"></section>

        <section id="tableWrap" class="table-wrap hidden" aria-live="polite">
          <table>
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
          </table>
        </section>

        <section id="mapWrap" class="map-wrap hidden" aria-live="polite">
          <div class="map-head">
            <div>
              <p class="muted" data-i18n="map.title">位置一覧</p>
              <h2><span id="mapCount">0</span> <span data-i18n="map.countSuffix">件を表示</span></h2>
            </div>
            <p id="mapPrecision" class="map-note"></p>
          </div>
          <div id="mapCanvas" class="map-canvas"></div>
          <div id="mapFallback" class="map-fallback hidden"></div>
        </section>
      </section>
    </main>

    <script src="assets/data.js"></script>
    <script src="assets/photo_meta.js"></script>
    <script src="assets/japanese_photo_refs.js"></script>
    <script src="assets/spot_locations.js"></script>
    <script src="assets/map_config.js"></script>
    <script src="assets/app.js"></script>
  </body>
</html>
