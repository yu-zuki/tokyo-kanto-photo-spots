<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>東京・関東 撮影地ノート</title>
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">Tokyo / Kanto Field Notes</p>
        <h1>東京・関東 撮影地ノート</h1>
      </div>
      <div class="header-stats" aria-label="データ概要">
        <div><strong id="totalCount">260</strong><span>候補地</span></div>
        <div><strong id="avgScore">-</strong><span>平均点</span></div>
        <div><strong id="savedCount">0</strong><span>保存済み</span></div>
      </div>
    </header>

    <main class="layout">
      <aside class="sidebar" aria-label="絞り込み条件">
        <section class="panel controls">
          <div class="panel-title">
            <h2>絞り込み</h2>
            <button class="icon-button" id="resetFilters" type="button" title="絞り込みをリセット" aria-label="絞り込みをリセット">↺</button>
          </div>

          <label class="search-box">
            <span>検索</span>
            <input id="searchInput" type="search" placeholder="撮影地、エリア、被写体、レンズ..." autocomplete="off" />
          </label>

          <div class="filter-group">
            <span>候補ランク</span>
            <div id="gradeFilter" class="multi-filter"></div>
          </div>

          <div class="filter-group">
            <span>都県</span>
            <div id="prefFilter" class="multi-filter"></div>
          </div>

          <div class="filter-group">
            <span>カテゴリ</span>
            <div id="typeFilter" class="multi-filter"></div>
          </div>

          <div class="filter-group">
            <span>アクセス</span>
            <div id="trafficFilter" class="multi-filter"></div>
          </div>

          <div class="filter-group">
            <span>移動時間</span>
            <div id="timeFilter" class="multi-filter"></div>
          </div>

          <label>
            <span>最低スコア <b id="minScoreValue">0</b></span>
            <input id="minScore" type="range" min="0" max="100" value="0" />
          </label>

          <label class="check-row">
            <input id="savedOnly" type="checkbox" />
            <span>保存済みのみ</span>
          </label>
        </section>

        <section class="panel">
          <div class="panel-title">
            <h2>日本の写真サイト</h2>
          </div>
          <div id="photoSites" class="photo-site-list"></div>
        </section>

        <section class="panel">
          <div class="panel-title">
            <h2>採点モデル</h2>
          </div>
          <div id="scoringModel" class="scoring-list"></div>
        </section>
      </aside>

      <section class="content">
        <section class="toolbar">
          <div>
            <p class="muted">表示中</p>
            <h2><span id="resultCount">0</span> 件</h2>
          </div>
          <div class="toolbar-actions">
            <label>
              <span>並び順</span>
              <select id="sortSelect">
                <option value="score-desc">スコアが高い順</option>
                <option value="score-asc">スコアが低い順</option>
                <option value="niche-desc">穴場度が高い順</option>
                <option value="traffic">アクセス優先</option>
                <option value="name">撮影地名</option>
              </select>
            </label>
            <div class="view-toggle" role="group" aria-label="表示切替">
              <button class="active" id="cardViewBtn" type="button">カード</button>
              <button id="tableViewBtn" type="button">表</button>
              <button id="mapViewBtn" type="button">地図</button>
            </div>
          </div>
        </section>

        <section class="summary-grid" aria-label="結果サマリー">
          <div class="panel">
            <h2>ランク分布</h2>
            <div id="gradeChart" class="bar-chart"></div>
          </div>
          <div class="panel">
            <h2>カテゴリ概要</h2>
            <div id="typeChart" class="bar-chart compact"></div>
          </div>
          <div class="panel highlight">
            <h2>最高スコア</h2>
            <div id="bestSpot"></div>
          </div>
        </section>

        <section id="cards" class="cards" aria-live="polite"></section>

        <section id="tableWrap" class="table-wrap hidden" aria-live="polite">
          <table>
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
          </table>
        </section>

        <section id="mapWrap" class="map-wrap hidden" aria-live="polite">
          <div class="map-head">
            <div>
              <p class="muted">位置一覧</p>
              <h2><span id="mapCount">0</span> 件を表示</h2>
            </div>
            <p id="mapPrecision" class="map-note"></p>
          </div>
          <div id="mapCanvas" class="map-canvas"></div>
          <div id="mapFallback" class="map-fallback hidden"></div>
        </section>
      </section>
    </main>

    <script src="assets/data.js"></script>
    <script src="assets/photo_meta.js"></script>
    <script src="assets/japanese_photo_refs.js"></script>
    <script src="assets/spot_locations.js"></script>
    <script src="assets/map_config.js"></script>
    <script src="assets/app.js"></script>
  </body>
</html>
